<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQR Dashboard · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:#F4F6FB;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-wrap{
  width:100%;max-width:440px;padding:24px;
}

/* Brand header */
.brand{
  text-align:center;margin-bottom:40px;
}
.brand-logos{
  display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:16px;
}
.brand-mqr{
  font-size:28px;font-weight:800;color:#0F1523;letter-spacing:-1px;
}
.brand-x{
  font-size:20px;font-weight:300;color:#CBD2E4;
}
.brand-blues{
  font-size:28px;font-weight:800;color:#1428FF;letter-spacing:-1px;
}
.brand-sub{
  font-size:13px;color:#8C93AD;letter-spacing:.02em;
}

/* Clerk component container */
#clerk-sign-in{
  display:flex;justify-content:center;
}

/* Clerk component overrides — match our design system */
.cl-rootBox{width:100%!important}
.cl-card{
  background:#FFFFFF!important;
  border:1px solid #E2E6F0!important;
  border-radius:16px!important;
  box-shadow:0 4px 16px rgba(15,21,35,.08)!important;
  font-family:'Outfit',sans-serif!important;
  padding:32px!important;
}
.cl-headerTitle{font-family:'Outfit',sans-serif!important;font-weight:700!important;color:#0F1523!important;font-size:22px!important}
.cl-headerSubtitle{font-family:'Outfit',sans-serif!important;color:#4B5675!important;font-size:13px!important}
.cl-formButtonPrimary{
  background:#1428FF!important;border-radius:8px!important;
  font-family:'Outfit',sans-serif!important;font-weight:600!important;
  text-transform:none!important;font-size:14px!important;height:42px!important;
}
.cl-formButtonPrimary:hover{background:#0f1fd4!important}
.cl-formFieldInput{
  font-family:'Outfit',sans-serif!important;
  border-color:#E2E6F0!important;border-radius:8px!important;
  color:#0F1523!important;font-size:14px!important;
}
.cl-formFieldInput:focus{border-color:#1428FF!important;box-shadow:0 0 0 3px rgba(20,40,255,.08)!important}
.cl-footerActionLink{color:#1428FF!important;font-family:'Outfit',sans-serif!important}
.cl-identityPreviewText,.cl-formFieldLabel{font-family:'Outfit',sans-serif!important;color:#4B5675!important}
.cl-dividerLine{background:#E2E6F0!important}
.cl-dividerText{color:#8C93AD!important;font-family:'Outfit',sans-serif!important}
.cl-socialButtonsIconButton{border-color:#E2E6F0!important;border-radius:8px!important}
.cl-internal-b3fm6y{display:none!important} /* hide "Secured by Clerk" */

/* Error / loading states */
#auth-error{
  display:none;
  background:#FEF2F2;border:1px solid #FECACA;
  border-radius:8px;padding:12px 16px;margin-top:16px;
  font-size:13px;color:#DC2626;text-align:center;
}
#auth-loading{
  text-align:center;padding:60px 0;color:#8C93AD;font-size:14px;
}

/* Footer */
.login-footer{
  text-align:center;margin-top:24px;
  font-size:11px;color:#8C93AD;letter-spacing:.03em;
}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-logos">
      <span class="brand-mqr">MQR</span>
      <span class="brand-x">×</span>
      <span class="brand-blues">BLUES</span>
    </div>
    <div class="brand-sub">Performance Dashboard · Cairo</div>
  </div>

  <div id="auth-loading">Loading…</div>
  <div id="clerk-sign-in"></div>
  <div id="auth-error">Sign-in unavailable. Please contact your administrator.</div>
  <div class="login-footer">Secure access · Internal use only</div>
</div>

<script>
  // ── Clerk publishable key — replace with your key from clerk.com ──
  const PUBLISHABLE_KEY = window.__CLERK_PUBLISHABLE_KEY__ || '';

  if (!PUBLISHABLE_KEY) {
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('auth-error').textContent = 'Dashboard not configured — CLERK_PUBLISHABLE_KEY missing.';
  } else {
    // Load Clerk JS
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
    script.onload = async () => {
      try {
        const clerk = new window.Clerk(PUBLISHABLE_KEY);
        await clerk.load();

        document.getElementById('auth-loading').style.display = 'none';

        if (clerk.user) {
          // Already signed in — go to dashboard
          window.location.href = '/';
          return;
        }

        clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
          afterSignInUrl: '/',
          afterSignUpUrl: '/',
          signUpUrl: '/login',
        });
      } catch (e) {
        document.getElementById('auth-loading').style.display = 'none';
        document.getElementById('auth-error').style.display = 'block';
        console.error('Clerk init failed:', e);
      }
    };
    script.onerror = () => {
      document.getElementById('auth-loading').style.display = 'none';
      document.getElementById('auth-error').style.display = 'block';
    };
    document.head.appendChild(script);
  }
</script>

</body>
</html>
