<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQR Dashboard · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Outfit',sans-serif;
  background:#F4F6FB;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
}
.wrap{width:100%;max-width:420px;padding:24px}

/* Brand */
.brand{text-align:center;margin-bottom:40px}
.brand-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px}
.brand-mqr{font-size:28px;font-weight:800;color:#0F1523;letter-spacing:-1px}
.brand-x{font-size:20px;font-weight:300;color:#CBD2E4}
.brand-blues{font-size:28px;font-weight:800;color:#1428FF;letter-spacing:-1px}
.brand-sub{font-size:13px;color:#8C93AD}

/* Card */
.card{
  background:#fff;border:1px solid #E2E6F0;border-radius:16px;
  padding:32px;box-shadow:0 4px 16px rgba(15,21,35,.08);
}
.card-title{font-size:20px;font-weight:700;color:#0F1523;margin-bottom:4px}
.card-sub{font-size:13px;color:#8C93AD;margin-bottom:28px}

/* Form */
.field{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:500;color:#4B5675;margin-bottom:6px}
input{
  width:100%;padding:11px 14px;
  border:1.5px solid #E2E6F0;border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:14px;color:#0F1523;
  outline:none;transition:border-color 150ms,box-shadow 150ms;
  background:#fff;
}
input:focus{border-color:#1428FF;box-shadow:0 0 0 3px rgba(20,40,255,.08)}
input::placeholder{color:#C0C6D9}

.btn{
  width:100%;padding:12px;
  background:#1428FF;color:#fff;
  border:none;border-radius:8px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:filter 150ms,transform 100ms;
  margin-top:8px;
}
.btn:hover{filter:brightness(1.12)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed;filter:none}

/* Error */
.error{
  display:none;
  background:#FEF2F2;border:1px solid #FECACA;
  border-radius:8px;padding:10px 14px;margin-bottom:18px;
  font-size:13px;color:#DC2626;
}

/* Footer */
.footer{text-align:center;margin-top:24px;font-size:11px;color:#8C93AD}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-row">
      <span class="brand-mqr">MQR</span>
      <span class="brand-x">×</span>
      <span class="brand-blues">BLUES</span>
    </div>
    <div class="brand-sub">Performance Dashboard · Cairo</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access the dashboard</div>

    <div class="error" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn" type="submit" id="submit-btn">Sign in</button>
    </form>
  </div>

  <div class="footer">Secure access · Internal use only</div>
</div>

<script>
  // Redirect to dashboard if already signed in
  fetch('/api/auth/me').then(r => {
    if (r.ok) window.location.replace('/');
  }).catch(() => {});

  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('submit-btn');
  const errEl   = document.getElementById('error-msg');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (res.ok) {
        window.location.replace('/');
      } else {
        showError(data.error || 'Sign in failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    } catch {
      showError('Connection error. Please check your internet and try again.');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
