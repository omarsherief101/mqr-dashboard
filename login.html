<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MQR Dashboard · Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  min-height:100dvh;
  display:grid;
  grid-template-columns:1fr 480px;
  background:#0D1117;
}

/* ── Left panel — full-bleed office photo ────────────────── */
.left-panel{
  position:relative;overflow:hidden;
  background:#0D1117;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px;
}

/* ── Left panel background system ──────────────────────── */

/* Full-bleed reception photo */
.bg-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center center;
  display:block;
}

/* Dark gradient overlay — keeps text readable, adds brand blue tint */
.bg-overlay{
  position:absolute;inset:0;
  background:
    linear-gradient(to bottom,
      rgba(10,12,18,.78) 0%,
      rgba(10,12,18,.45) 35%,
      rgba(10,12,18,.60) 65%,
      rgba(10,12,18,.90) 100%),
    linear-gradient(135deg, rgba(20,40,255,.15) 0%, transparent 55%);
}

/* Bottom-left blue glow accent */
.office-strip{
  position:absolute;
  bottom:-80px;left:-80px;
  width:380px;height:380px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(20,40,255,.20) 0%, transparent 70%);
  pointer-events:none;
  z-index:1;
}

.left-content{position:relative;z-index:2;text-align:center}
.left-brand{
  display:flex;align-items:center;gap:14px;justify-content:center;
  margin-bottom:28px;
}
.left-mqr{font-size:48px;font-weight:800;color:#fff;letter-spacing:-2px;text-shadow:0 2px 20px rgba(0,0,0,.4)}
.left-x{font-size:32px;font-weight:200;color:rgba(255,255,255,.4)}
.left-blues{font-size:48px;font-weight:800;color:#4D6AFF;letter-spacing:-2px;text-shadow:0 2px 20px rgba(20,40,255,.4)}
.left-tagline{
  font-size:15px;color:rgba(255,255,255,.55);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:48px;
  text-shadow:0 1px 8px rgba(0,0,0,.5);
}
.left-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
  background:rgba(255,255,255,.12);
  border-radius:12px;overflow:hidden;max-width:360px;margin:0 auto;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.stat-item{
  background:rgba(13,17,23,.7);padding:18px 12px;text-align:center;
}
.stat-num{font-size:28px;font-weight:800;color:#5B7BFF;letter-spacing:-1px}
.stat-lbl{font-size:11px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* Location dots animation */
.location-dots{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:28px;
}
.loc-dot{
  width:6px;height:6px;border-radius:50%;background:#1428FF;opacity:.3;
  animation:dotpulse 2s ease-in-out infinite;
}
.loc-dot:nth-child(2){animation-delay:.3s}
.loc-dot:nth-child(3){animation-delay:.6s}
.loc-dot:nth-child(4){animation-delay:.9s}
.loc-dot:nth-child(5){animation-delay:1.2s}
@keyframes dotpulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ── Right panel — login form ────────────────────────────── */
.right-panel{
  background:#FFFFFF;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 40px;min-height:100vh;
}

.form-wrap{width:100%;max-width:360px}

/* Welcome greeting */
.greeting{
  font-size:28px;font-weight:800;color:#0F1523;letter-spacing:-1px;
  margin-bottom:4px;
  opacity:0;transform:translateY(16px);
  animation:slideUp 500ms 100ms var(--ease-spring) forwards;
}
.greeting-sub{
  font-size:14px;color:#8C93AD;margin-bottom:36px;
  opacity:0;transform:translateY(12px);
  animation:slideUp 500ms 200ms var(--ease-spring) forwards;
}
@keyframes slideUp{to{opacity:1;transform:none}}

/* Brand mark on form side */
.form-brand{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
  opacity:0;animation:slideUp 500ms 0ms var(--ease-spring) forwards;
}
.form-mqr{font-size:22px;font-weight:800;color:#0F1523;letter-spacing:-.5px}
.form-x{font-size:16px;font-weight:300;color:#CBD2E4}
.form-blues{font-size:22px;font-weight:800;color:#1428FF;letter-spacing:-.5px}

:root{--ease-spring:cubic-bezier(0.16,1,0.3,1)}

/* Form */
.field{
  margin-bottom:18px;
  opacity:0;transform:translateY(10px);
  animation:slideUp 500ms var(--ease-spring) forwards;
}
.field:nth-child(1){animation-delay:300ms}
.field:nth-child(2){animation-delay:380ms}
.field:nth-child(3){animation-delay:460ms}

label{display:block;font-size:13px;font-weight:500;color:#4B5675;margin-bottom:6px}
input{
  width:100%;padding:12px 14px;
  border:1.5px solid #E2E6F0;border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:14px;color:#0F1523;
  outline:none;transition:border-color 150ms,box-shadow 150ms;
  background:#FAFBFF;
}
input:focus{border-color:#1428FF;box-shadow:0 0 0 3px rgba(20,40,255,.08);background:#fff}
input::placeholder{color:#C0C6D9}

/* Password show/hide */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:46px}
.pw-toggle{
  position:absolute;top:50%;right:6px;transform:translateY(-50%);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:none;border:none;border-radius:8px;cursor:pointer;
  color:#8A93AD;transition:color 150ms,background 150ms;padding:0;
}
.pw-toggle:hover{color:#1428FF;background:rgba(20,40,255,.06)}
.pw-toggle:focus-visible{outline:2px solid #1428FF;outline-offset:1px}

.btn{
  width:100%;padding:13px;
  background:#1428FF;color:#fff;
  border:none;border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;
  transition:filter 150ms,transform 100ms,box-shadow 200ms;
  margin-top:8px;
  box-shadow:0 4px 16px rgba(20,40,255,.3);
  letter-spacing:.02em;
  opacity:0;animation:slideUp 500ms 520ms var(--ease-spring) forwards;
}
.btn:hover{filter:brightness(1.12);box-shadow:0 6px 24px rgba(20,40,255,.4)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.6;cursor:not-allowed;filter:none;box-shadow:none}

/* Error */
.error{
  display:none;
  background:#FEF2F2;border:1px solid #FECACA;
  border-radius:8px;padding:10px 14px;margin-bottom:18px;
  font-size:13px;color:#DC2626;
}

/* Footer */
.footer-note{
  text-align:center;margin-top:28px;font-size:11px;color:#C0C6D9;
  opacity:0;animation:slideUp 500ms 600ms var(--ease-spring) forwards;
}

/* Mobile */
@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .left-panel{min-height:180px;padding:28px 24px}
  .left-brand{gap:8px}
  .left-mqr,.left-blues{font-size:32px}
  .left-x{font-size:22px}
  .left-tagline{font-size:12px;margin-bottom:20px}
  .left-stats{display:none}
  .office-strip{width:200px;height:200px;bottom:-60px;left:-60px}
  .right-panel{padding:32px 24px}
}
</style>
</head>
<body>

<!-- Left brand panel -->
<div class="left-panel">
  <img class="bg-img" src="/mqr%20backround%20login%20page%201.png" alt="" aria-hidden="true" loading="eager">
  <div class="bg-overlay"></div>
  <div class="office-strip"></div>

  <div class="left-content">
    <div class="left-brand">
      <span class="left-mqr">MQR</span>
      <span class="left-x">×</span>
      <span class="left-blues">BLUES</span>
    </div>
    <div class="left-tagline">Performance Dashboard · Cairo</div>

    <div class="left-stats">
      <div class="stat-item">
        <div class="stat-num">15</div>
        <div class="stat-lbl">Locations</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">Live</div>
        <div class="stat-lbl">Data</div>
      </div>
      <div class="stat-item">
        <div class="stat-num">24/7</div>
        <div class="stat-lbl">Tracking</div>
      </div>
    </div>

    <div class="location-dots">
      <div class="loc-dot"></div>
      <div class="loc-dot"></div>
      <div class="loc-dot"></div>
      <div class="loc-dot"></div>
      <div class="loc-dot"></div>
    </div>
  </div>
</div>

<!-- Right login panel -->
<div class="right-panel">
  <div class="form-wrap">
    <div class="form-brand">
      <span class="form-mqr">MQR</span>
      <span class="form-x">×</span>
      <span class="form-blues">BLUES</span>
    </div>

    <div class="greeting">Welcome back 👋</div>
    <div class="greeting-sub">Sign in to access your live dashboard</div>

    <div class="error" id="error-msg"></div>

    <form id="login-form">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <button type="button" id="pw-toggle" class="pw-toggle" aria-label="Show password" aria-pressed="false" title="Show password">
            <svg id="pw-eye" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="field">
        <button class="btn" type="submit" id="submit-btn">Sign in →</button>
      </div>
    </form>

    <div class="footer-note">Secure access · Internal use only · MQR × Blues Agency</div>
  </div>
</div>

<script>
  // Redirect to dashboard if already signed in
  fetch('/api/auth/me').then(r => {
    if (r.ok) window.location.replace('/');
  }).catch(() => {});

  const form    = document.getElementById('login-form');
  const btn     = document.getElementById('submit-btn');
  const errEl   = document.getElementById('error-msg');

  // Show / hide password
  const pwInput  = document.getElementById('password');
  const pwToggle = document.getElementById('pw-toggle');
  const pwEye    = document.getElementById('pw-eye');
  const EYE_OPEN  = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
  const EYE_OFF   = '<path d="M3 3l18 18"/><path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c6.5 0 10 7 10 7a18.4 18.4 0 0 1-3.2 4.1M6.6 6.6A18.4 18.4 0 0 0 2 12s3.5 7 10 7a10.9 10.9 0 0 0 4-.76"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>';
  pwToggle.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    pwEye.innerHTML = show ? EYE_OFF : EYE_OPEN;
    pwToggle.setAttribute('aria-pressed', show ? 'true' : 'false');
    pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    pwToggle.title = show ? 'Hide password' : 'Show password';
    pwInput.focus();
  });

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    errEl.style.display = 'none';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();

      if (res.ok) {
        btn.textContent = '✓ Success!';
        setTimeout(() => window.location.replace('/'), 300);
      } else {
        showError(data.error || 'Sign in failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in →';
      }
    } catch {
      showError('Connection error. Please check your internet and try again.');
      btn.disabled = false;
      btn.textContent = 'Sign in →';
    }
  });
</script>
</body>
</html>
